server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html/latest;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        autoindex off;
        add_header Cache-Control "no-store";
    }

    location /history/ {
        alias /usr/share/nginx/html/history/;
        autoindex off;
        add_header Cache-Control "no-store";
    }
}
